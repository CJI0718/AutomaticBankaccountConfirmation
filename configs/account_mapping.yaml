# 금융상품 종류 → 감사 계정분류 매핑 (일반기업회계기준).
#
# 조회서의 product_type(금융상품의 종류)과 만기일을 보고 감사 계정분류를 부여한다.
# 이 분류는 PBC(회사제시 금융자산/부채 명세)와 같은 축으로 맞추기 위한 것이며,
# 감사인의 최종 판단을 대체하지 않는다 — 애매한 항목은 '검토필요'로 분리한다.
#
# 분류 우선순위:
#   1) review_keywords 포함        -> 검토필요 (사람 판단: 퇴직연금/신탁 등)
#   2) demand_keywords 포함        -> 현금및현금성자산 (요구불·수시입출)
#   3) time_keywords 포함          -> 만기 잔여로 단기/장기금융상품 판정
#   4) 그 외                       -> 검토필요(미분류)

fiscal_reference: confirmation_date   # 만기 잔여 계산 기준일 = 조회기준일
short_term_months: 12                 # 잔여 만기 <= 12개월 -> 단기, 초과 -> 장기

categories:
  현금및현금성자산:
    side: 자산
    demand_keywords:
      - 보통예금
      - 당좌예금
      - 기업자유
      - 자유예금
      - 별단예금
      - MMDA
      - 체인지업
      - 종합통장
      - 스크랩거래
  금융상품:                            # 단기/장기는 만기로 자동 분기
    side: 자산
    time_keywords:
      - 정기예금
      - 정기적금
      - 정기예탁
      - 고정금리
      - S드림
      - 양도성
      - 표지어음
      - 환매조건부

# 퇴직연금(DB)은 사외적립자산 — 퇴직급여충당부채에서 차감 표시.
# (DB/DC 구분은 회계사 확인 대상이나 기본 분류는 부여한다.)
plan_asset_keywords:
  - 퇴직연금

review_keywords:                       # 사람 판단 필요 -> 검토필요
  - 신탁
  - 연금
  - 변액

labels:
  short_term: 단기금융상품
  long_term: 장기금융상품
  plan_asset: 사외적립자산
  review: 검토필요
  unclassified: 검토필요(미분류)
