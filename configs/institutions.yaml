      loans: "대출 거래"
      guarantees: "지급보증 및 기타 약정사항"

# Phrases that explicitly mark an institution as NOT dealing with the company.
# These are document-level (printed in lieu of any data) and are detected
# deterministically. Per-cell empties ("해당 없음" / "해당 거래 없음") are NOT here
# — an all-empty-but-returned form is flagged for human review, not auto-classified.
no_transaction_phrases:
  - "당사 거래회사 아님"
  - "당사 거래 회사 아님"
  - "거래하지 않는 금융기관"

# The status string cck writes into the 요약 sheet for non-dealing institutions.
status_labels:
  complete: "완료"
  non_dealing: "거래하지 않는 금융기관의 조회서입니다."
  empty_review: "거래 없음(검토필요)"

money:
  default_currency: KRW
  known_currencies:
    - KRW
    - WON
    - USD
    - EUR
    - JPY
