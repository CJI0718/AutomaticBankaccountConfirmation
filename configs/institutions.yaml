      - 국민은행
      - 기업은행
      - 신한은행
      - 우리은행
    section_signatures:
      deposits: "당 은행에 대한 금융상품"
      loans: "당 은행의 대출거래"
      guarantees: "당 은행의 지급보증"
      derivatives: "미결제파생상품계약"

